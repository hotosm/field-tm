<!doctype html>
<html lang="{{ current_locale() }}" class="hot-theme-light wa-theme-default wa-palette-hotosm">
  <head>
    <title>{% block title %}{{ _("Field Tasking Manager") }}{% endblock %}</title>

    <meta charset="UTF-8" />
    <meta name="description" content="{{ _("Coordinated field mapping for Open Mapping campaigns.") }}" />
    <meta name="author" content="Humanitarian OpenStreetMap Team" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width"
    />
    <meta name="theme-color" content="#d63f3f" />

    <!-- Resource hints to reduce first-paint theme/font flash -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" href="/favicon.png" sizes="16x16" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- Load Google Fonts directly so the browser applies the stylesheet immediately. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;700&family=Barlow:wght@400;500;700&family=Barlow+Condensed:wght@400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    />

    <!-- Critical tokens inlined so the page looks correct before any CDN CSS arrives. -->
    <!-- Also hides undefined web-component elements until they upgrade (avoids FOUC  -->
    <!-- without blanking the whole page - each element pops in individually).        -->
    <style>
      :root {
        /* HOT brand red - set before theme CSS loads so buttons never flash blue/grey */
        --wa-color-brand-fill-loud: #d43f3f;
        --wa-color-brand-border-loud: #ed5c5e;
        --wa-color-brand-on-loud: #ffffff;
        /* Core neutrals so body text and backgrounds look right immediately */
        --hot-color-neutral-900: #404248;
        --hot-color-neutral-50: #f3f3f3;
        --hot-color-neutral-100: #e8e8e8;
      }

      /* Hide only web-component elements until they are defined/upgraded.
         visibility:hidden (not display:none) preserves layout so the page
         doesn't jump as each component registers. */
      wa-button:not(:defined),
      wa-card:not(:defined),
      wa-badge:not(:defined),
      wa-callout:not(:defined),
      wa-input:not(:defined),
      wa-textarea:not(:defined),
      wa-select:not(:defined),
      wa-tag:not(:defined),
      wa-dialog:not(:defined),
      hot-header:not(:defined),
      hotosm-auth:not(:defined),
      hotosm-tool-menu:not(:defined) {
        visibility: hidden;
      }
    </style>

    <!-- WebAwesome CSS - loaded from CDN so the browser caches it across all HOT tools -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/native.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/utilities.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/themes/default.css"
    />

    <!-- Import map: lets the browser resolve WebAwesome bare-module specifiers used -->
    <!-- inside hotosm-ui.js so WA components load correctly (incl. inside Shadow DOM). -->
    <script type="importmap">
      {
        "imports": {
          "@awesome.me/webawesome/dist/components/": "https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist-cdn/components/"
        }
      }
    </script>
    <script type="module">
      import "@awesome.me/webawesome/dist/components/badge/badge.js";
      import "@awesome.me/webawesome/dist/components/button/button.js";
      import "@awesome.me/webawesome/dist/components/callout/callout.js";
      import "@awesome.me/webawesome/dist/components/card/card.js";
      import "@awesome.me/webawesome/dist/components/dialog/dialog.js";
      import "@awesome.me/webawesome/dist/components/input/input.js";
      import "@awesome.me/webawesome/dist/components/select/select.js";
      import "@awesome.me/webawesome/dist/components/tag/tag.js";
      import "@awesome.me/webawesome/dist/components/textarea/textarea.js";
    </script>

    <!-- HOT UI theme + components -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@hotosm/ui@0.9.0/dist/style-core.css"
    />
    <!-- modulepreload: browser fetches, parses, and compiles the module eagerly  -->
    <!-- so custom elements are defined as soon as possible after the page loads. -->
    <link
      rel="modulepreload"
      href="https://cdn.jsdelivr.net/npm/@hotosm/ui@0.9.0/dist/hotosm-ui.js"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@hotosm/ui@0.9.0/dist/hotosm-ui.js"
    ></script>
    {% if auth_enabled %}
    <link
      rel="modulepreload"
      href="https://cdn.jsdelivr.net/npm/@hotosm/hanko-auth@0.5.2/dist/hanko-auth.esm.js"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@hotosm/hanko-auth@0.5.2/dist/hanko-auth.esm.js"
    ></script>
    {% endif %}

    <!-- App styles -->
    <link rel="stylesheet" href="/static/css/app.css" />

    <!-- HTMX -->
    <!-- Config required to swap 4xx server responses, so error messages are displayed in UI -->
    <meta
      name="htmx-config"
      content='{"responseHandling":[{"code":"204","swap":false},{"code":"[23]..","swap":true},{"code":"[45]..","swap":true,"error":true}]}'
    />
    <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>

    <!-- Maps - Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    {% block extra_head %}{% endblock %}
  </head>

  <body>
    <hot-header id="app-header" title="FieldTM" size="medium">
      {% if auth_enabled %}
      <hotosm-auth
        slot="auth"
        hanko-url="{{ hanko_public_url }}"
        base-path="{{ hanko_public_url }}"
        redirect-after-login="{{ frontend_url }}"
        redirect-after-logout="{{ frontend_url }}"
        button-variant="filled"
        lang="{{ current_locale() }}"
        mapping-check-url="/api/v1/auth/profile/me"
      ></hotosm-auth>
      <hotosm-tool-menu slot="auth" lang="{{ current_locale() }}"></hotosm-tool-menu>
      {% endif %}
    </hot-header>

    {% block content %}{% endblock %}

    <script>
      {% if auth_enabled %}
      // hotosm-auth emits 'hanko-login' on every page load when a session exists.
      // We call /profile/me once per session: it syncs the user into the FTM
      // database and returns the OSM username, which we set as display-name so
      // hotosm-auth shows the username instead of the raw Hanko UUID.
      const hotosmAuth = document.querySelector("hotosm-auth");
      if (hotosmAuth) {
        // Helper: push a display name into hotosm-auth via both attribute and
        // direct Lit property so the component re-renders immediately.
        function _setDisplayName(name) {
          hotosmAuth.setAttribute("display-name", name);
          // Also set the Lit reactive property directly so the component
          // re-renders even if attributeChangedCallback is delayed.
          if ("displayNameAttr" in hotosmAuth) {
            hotosmAuth.displayNameAttr = name;
          }
        }

        // Helper: overwrite the profile-email text inside hotosm-auth's Shadow DOM.
        // The component renders `this.user.email || this.user.id` there; SSO users
        // (OSM OAuth) have no email in Hanko so it falls back to the UUID.
        // We replace the text directly via shadowRoot (open mode → accessible).
        // The equality check prevents an infinite observer loop: after we set
        // textContent the observer fires again, but finds current === email → no-op.
        function _patchProfileEmail(email) {
          const root = hotosmAuth.shadowRoot;
          if (!root) return;
          const el = root.querySelector(".profile-email");
          if (!el || el.textContent.trim() === email) return;
          el.textContent = email;
        }

        // Set up a MutationObserver on the shadow root so we re-patch whenever
        // Lit re-renders (opening/closing the dropdown changes `isOpen`, which
        // triggers a full re-render that resets profile-email back to the UUID).
        // Must be called after the shadow root exists (inside event handlers).
        let _emailObserverReady = false;
        function _setupEmailObserver() {
          if (_emailObserverReady) return;
          const root = hotosmAuth.shadowRoot;
          if (!root) return;
          _emailObserverReady = true;
          new MutationObserver(() => {
            const email = sessionStorage.getItem("ftm_display_name_v2");
            if (email) _patchProfileEmail(email);
          }).observe(root, { subtree: true, childList: true, characterData: true });
        }

        // Apply a cached name immediately (before hanko-login fires) so there
        // is no flash of UUID on navigations after the first profile fetch.
        // Note: shadowRoot is not yet available here (ESM not loaded), so only
        // _setDisplayName runs now; _patchProfileEmail runs inside the event handler.
        const _cached = sessionStorage.getItem("ftm_display_name_v2");
        if (_cached) _setDisplayName(_cached);

        hotosmAuth.addEventListener("hanko-login", async () => {
          // shadowRoot is guaranteed to exist inside event handlers.
          _setupEmailObserver();
          const cachedName = sessionStorage.getItem("ftm_display_name_v2");
          if (cachedName) {
            _setDisplayName(cachedName);
            _patchProfileEmail(cachedName);
            return;
          }
          try {
            const resp = await fetch("/api/v1/auth/profile/me", { credentials: "include" });
            if (resp.ok) {
              const profile = await resp.json();
              // DbUser serializes email as `email_address`; prefer it so the
              // dropdown shows the full email rather than the email-prefix username.
              const name = profile.email_address || profile.username || profile.name;
              if (name) {
                sessionStorage.setItem("ftm_display_name_v2", name);
                _setDisplayName(name);
                _patchProfileEmail(name);
              }
            }
          } catch (e) {
            console.warn("Field-TM: failed to sync user profile:", e);
          }
        });

        hotosmAuth.addEventListener("hanko-logout", () => {
          sessionStorage.removeItem("ftm_display_name_v2");
        });
      }
      {% endif %}

      // hot-header tabs must be set as a JS property (not an HTML attribute)
      // because tab objects contain clickEvent functions that can't be serialised.
      const appHeader = document.getElementById("app-header");
      if (appHeader) {
        appHeader.tabs = [
          {
            label: {{ _("Projects")|tojson }},
            href: "/projects",
            clickEvent: () => {
              window.location.href = "/projects";
            },
          },
          {
            label: {{ _("Create Project")|tojson }},
            href: "/new",
            clickEvent: () => {
              window.location.href = "/new";
            },
          },
          {
            label: {{ _("QField Admin")|tojson }},
            href: "/qfc-admin",
            clickEvent: () => {
              window.location.href = "/qfc-admin";
            },
          },
        ];
      }
    </script>
  </body>
</html>
