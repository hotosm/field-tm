apiVersion: v1
kind: Service
metadata:
  name: {{ include "field-tm.fullname" . }}
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "field-tm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
