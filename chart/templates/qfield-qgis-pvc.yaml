{{- if and .Values.qfieldQgis.enabled .Values.qfieldQgis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "field-tm.fullname" . }}-qfield-projects
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
spec:
  # ReadWriteMany is required because the backend pod(s) and the separate
  # qfield-qgis Deployment pods all need concurrent access to the shared
  # /opt/qfield volume. Ensure your StorageClass supports RWX
  # (e.g. NFS, CephFS, AWS EFS, Azure Files).
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.qfieldQgis.persistence.size }}
  {{- with .Values.qfieldQgis.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
