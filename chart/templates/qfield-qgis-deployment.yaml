{{- if .Values.qfieldQgis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "field-tm.fullname" . }}-qgis
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: qgis
spec:
  replicas: {{ .Values.qfieldQgis.replicaCount }}
  selector:
    matchLabels:
      {{- include "field-tm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qgis
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "field-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: qgis
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qgis
          image: "{{ .Values.qfieldQgis.image.repository }}:{{ default .Values.qfieldCloud.tag .Values.qfieldQgis.image.tag }}"
          imagePullPolicy: {{ .Values.qfieldQgis.image.pullPolicy }}
          {{- with .Values.qfieldQgis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            {{- if .Values.db.enabled }}
            - name: FTM_DB_HOST
              value: {{ include "field-tm.dbServiceHost" . | quote }}
            - name: FTM_DB_USER
              value: {{ .Values.db.auth.username | quote }}
            - name: FTM_DB_PASSWORD
              value: {{ .Values.db.auth.password | quote }}
            - name: FTM_DB_NAME
              value: {{ .Values.db.auth.database | quote }}
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $key, $val := .Values.qfieldQgis.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if .Values.existingSecret.name }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret.name | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.qfieldQgis.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
