{{- if .Values.qfieldQgis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "field-tm.fullname" . }}-qgis
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: qgis
spec:
  replicas: {{ .Values.qfieldQgis.replicaCount }}
  selector:
    matchLabels:
      {{- include "field-tm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qgis
  # Recreate avoids two pods briefly writing to the same PVC directory during a
  # rolling update, which could corrupt an in-progress project generation.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "field-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: qgis
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qgis
          image: "{{ .Values.qfieldQgis.image.repository }}:{{ .Values.qfieldQgis.image.tag }}"
          imagePullPolicy: {{ .Values.qfieldQgis.image.pullPolicy }}
          {{- with .Values.qfieldQgis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            {{- range $key, $val := .Values.qfieldQgis.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.qfieldQgis.resources | nindent 12 }}
          volumeMounts:
            - name: qfield-projects
              mountPath: {{ .Values.qfieldQgis.persistence.mountPath }}
      volumes:
        - name: qfield-projects
          {{- if .Values.qfieldQgis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "field-tm.fullname" . }}-qfield-projects
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
