apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "field-tm.fullname" . }}
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "field-tm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "field-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "field-tm.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.db.enabled }}
        - name: db-check
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: IfNotPresent
          {{- with .Values.dbCheckSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: FTM_DB_HOST
              value: {{ include "field-tm.dbServiceHost" . | quote }}
            - name: FTM_DB_USER
              value: {{ .Values.db.auth.username | quote }}
            - name: FTM_DB_PASSWORD
              value: {{ .Values.db.auth.password | quote }}
            - name: FTM_DB_NAME
              value: {{ .Values.db.auth.database | quote }}
          command:
            - /bin/bash
            - -c
            - |
              until pg_isready -h "$FTM_DB_HOST" -U "$FTM_DB_USER" -d "$FTM_DB_NAME"; do
                  echo "waiting for database to be ready";
                  sleep 2;
              done;
        {{- end }}
        - name: migrations
          image: "{{ .Values.image.repository }}/backend:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.initSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.db.enabled }}
          env:
            - name: FTM_DB_HOST
              value: {{ include "field-tm.dbServiceHost" . | quote }}
            - name: FTM_DB_USER
              value: {{ .Values.db.auth.username | quote }}
            - name: FTM_DB_PASSWORD
              value: {{ .Values.db.auth.password | quote }}
            - name: FTM_DB_NAME
              value: {{ .Values.db.auth.database | quote }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else if .Values.backend.extraEnv }}
          env:
            {{- toYaml .Values.backend.extraEnv | nindent 12 }}
          {{- end }}
          envFrom:
            {{- toYaml .Values.backend.extraEnvFrom | nindent 12 }}
          command: ["/migrate-entrypoint.sh"]
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}/backend:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.backend.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          env:
            - name: FTM_DOMAIN
              {{- if .Values.backend.ingress.enabled }}
              value: {{ required "backend.ingress.host is required when backend.ingress.enabled=true" .Values.backend.ingress.host | quote }}
              {{- else }}
              value: "localhost"
              {{- end }}
            {{- if .Values.db.enabled }}
            - name: FTM_DB_HOST
              value: {{ include "field-tm.dbServiceHost" . | quote }}
            - name: FTM_DB_USER
              value: {{ .Values.db.auth.username | quote }}
            - name: FTM_DB_PASSWORD
              value: {{ .Values.db.auth.password | quote }}
            - name: FTM_DB_NAME
              value: {{ .Values.db.auth.database | quote }}
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            {{- toYaml .Values.backend.extraEnvFrom | nindent 12 }}
          volumeMounts:
          {{- with .Values.backend.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.backend.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
