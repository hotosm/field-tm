{{- if .Values.db.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "field-tm.dbServiceName" . }}
  labels:
    {{- include "field-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "field-tm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
{{- end }}
