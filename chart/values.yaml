# Default values for field-tm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

domain: field.localhost

image:
  repository: ghcr.io/hotosm/field-tm
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

backend:
  # Secrets to load env vars from. The following keys are expected:
  #   api-ftm-vars: ENCRYPTION_KEY, OSM_CLIENT_ID, OSM_CLIENT_SECRET, OSM_SECRET_KEY,
  #                  ODK_CENTRAL_URL, ODK_CENTRAL_PUBLIC_URL, ODK_CENTRAL_USER, ODK_CENTRAL_PASSWD
  # Optional:
  #   db-ftm-vars: FTM_DB_HOST, FTM_DB_USER, FTM_DB_PASSWORD, FTM_DB_NAME
  # Bundled db.enabled=true injects FTM_DB_* directly from db.auth values.
  extraEnvFrom:
    - secretRef:
        name: db-ftm-vars
        optional: true
    - secretRef:
        name: api-ftm-vars
  extraEnv: []

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: true
    className: ""
    annotations:
      kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  livenessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http
  readinessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # Optional command/args override for main backend container.
  command: []
  args: []

db:
  # Default is to use an external database; enable for local/in-cluster PostGIS.
  enabled: false
  image:
    repository: postgis/postgis
    tag: 18-3.6
    pullPolicy: IfNotPresent
  # TODO this is mostly for local dev, so do we need secret based config?
  auth:
    username: fieldtm
    password: fieldtm
    database: fieldtm
  command:
    - -c
    - max_connections=300
  primary:
    podSecurityContext: {}
    securityContext: {}
    dataMountPath: /var/lib/postgresql
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 500Mi
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

initSecurityContext: {}
dbCheckSecurityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}
