# Default values for field-tm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

domain: field.localhost

image:
  repository: ghcr.io/hotosm/field-tm
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

backend:
  # Override the DB host when using an external database instead of the bundled PostgreSQL.
  # When db.enabled is true, the host is automatically derived from the release name.
  dbHostOverride: ""

  # Secrets to load env vars from. The following keys are expected:
  #   db-ftm-vars: FTM_DB_USER, FTM_DB_PASSWORD, FTM_DB_NAME
  #   api-ftm-vars: ENCRYPTION_KEY, OSM_CLIENT_ID, OSM_CLIENT_SECRET, OSM_SECRET_KEY,
  #                  ODK_CENTRAL_URL, ODK_CENTRAL_PUBLIC_URL, ODK_CENTRAL_USER, ODK_CENTRAL_PASSWD
  extraEnvFrom:
    - secretRef:
        name: db-ftm-vars
    - secretRef:
        name: api-ftm-vars

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: true
    className: ""
    annotations:
      kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  livenessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http
  readinessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

db:
  # This can be disabled, but an external database must be configured, with Postgis
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 14-debian-12
  auth:
    enablePostgresUser: false
    username: fieldtm
    database: fieldtm
    # Must contain keys postgres-password and password
    existingSecret: db-ftm-vars
    secretKeys:
      userPasswordKey: FTM_DB_PASSWORD
  initdb:
    scripts:
      01-enable-postgis.sql: |
        CREATE EXTENSION IF NOT EXISTS postgis;
  primary:
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 500Mi

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

nodeSelector: {}

tolerations: []

affinity: {}
