# Default values for field-tm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/hotosm/field-tm
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Reference to an existing secret containing environment variables.
existingSecret:
  name: ""

# Environment variables to set on the backend container (and migrations init container).
env: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  # Public hostname for the service. Required when ingress is enabled.
  # This is also used to set the FTM_DOMAIN environment variable.
  # When ingress is disabled (e.g. local dev via port-forward), FTM_DOMAIN
  # automatically defaults to "localhost".
  host: field.localhost
  annotations: {}
  # TLS configuration. Set enabled: true for HTTPS.
  # secretName defaults to "<host>-tls" if left empty (useful with cert-manager).
  tls:
    enabled: false
    secretName: ""

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /__lbheartbeat__
    port: http
readinessProbe:
  httpGet:
    path: /__lbheartbeat__
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Optional command/args override for main backend container.
command: []
args: []

db:
  # Default is to use an external database; enable for local/in-cluster PostGIS.
  enabled: false
  image:
    repository: postgis/postgis
    tag: 18-3.6
    pullPolicy: IfNotPresent
  # TODO this is mostly for local dev, so do we need secret based config?
  auth:
    username: fieldtm
    password: fieldtm
    database: fieldtm
  command:
    - -c
    - max_connections=300
  primary:
    podSecurityContext: {}
    securityContext: {}
    dataMountPath: /var/lib/postgresql
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 500Mi
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""

qfieldQgis:
  # Deploy the QGIS project-generation wrapper as a separate Deployment with its
  # own ClusterIP Service. QFIELDCLOUD_QGIS_URL is automatically pointed at that
  # Service so the backend can call it.
  enabled: true
  # One replica is sufficient: the threading.Lock in the service queues concurrent
  # requests rather than dropping them, so jobs always complete in order.
  # Increase if project generation throughput becomes a bottleneck.
  replicaCount: 1
  # Optional override for the QGIS wrapper image tag.
  # Leave empty to use qfieldCloud.tag.
  image:
    repository: ghcr.io/hotosm/field-tm/qgis
    tag: ""
    pullPolicy: IfNotPresent
  env:
    LOG_LEVEL: INFO
  resources: {}
  securityContext: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

initSecurityContext: {}
dbCheckSecurityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

qfieldCloud:
  enabled: false
  tag: "26.3"
