# Self-hosted Hanko authentication service for local development and self-hosting.
# Use with: docker compose -f compose.yaml -f contrib/login/compose.yaml up -d
# Or via:   just start login
#
# This file extends the base compose.yaml with:
#   - hanko-db, hanko-config, hanko-migrate, hanko  (the Hanko auth stack)
#   - proxy override: adds login.field.localhost routing to Hanko
#   - api override:   injects HANKO_API_URL + HANKO_PUBLIC_URL automatically
#
# No .env changes are needed for local dev — Hanko URLs are wired in here.
# For production / Kubernetes, configure an external Hanko instance via
# HANKO_API_URL and HANKO_PUBLIC_URL, or set DISABLE_LOGIN=true to skip auth.
#
# Email (OTP passcodes) is captured by the local mailpit UI at:
#   http://mail.field.localhost:${FTM_DEV_PORT:-7050}

name: field-tm

networks:
  ftm-net:
    external: true
    name: field-tm-local

volumes:
  hanko_config:
  hanko_data:

services:
  # Wire the proxy to route login.field.localhost to the Hanko service.
  # SERVER_NAME is overridden here (merged by Compose) to add login.field.localhost;
  # it is absent from the base compose.yaml so the proxy never references a Hanko
  # upstream that isn't running.
  proxy:
    environment:
      SERVER_NAME: field.localhost login.field.localhost odk.field.localhost qfield.field.localhost mail.field.localhost
      login.field.localhost_REVERSE_PROXY_HOST: http://hanko:8000
      # Let upstream Hanko errors/status codes pass through for easier debugging.
      login.field.localhost_REVERSE_PROXY_INTERCEPT_ERRORS: "no"
      # login.field.localhost_USE_CORS: "yes"
      # login.field.localhost_CORS_ALLOW_CREDENTIALS: "yes"

  # Inject Hanko URLs into the API so developers don't have to set them in .env.
  # HANKO_API_URL   – backend → Hanko (internal Docker network)
  # HANKO_PUBLIC_URL – browser → Hanko (via the proxy on the host port)
  # Compose merges environment maps, so all other api env vars are preserved.
  api:
    environment:
      HANKO_API_URL: http://hanko:8000
      HANKO_PUBLIC_URL: http://login.field.localhost:${FTM_DEV_PORT:-7050}
    depends_on:
      hanko:
        condition: service_started

  # Render the Hanko config template with environment variable substitution.
  # Output is written to the hanko_config volume, consumed by hanko-migrate and hanko.
  hanko-config:
    image: alpine:3.23
    command: >
      sh -c "apk add --no-cache gettext &&
             envsubst < /tpl/hanko-config.tpl.yaml > /config/hanko-config.yaml &&
             echo '--- rendered config ---' &&
             cat /config/hanko-config.yaml"
    environment:
      HANKO_DB_HOST: hanko-db
      HANKO_DB_USER: ${HANKO_DB_USER:-hanko}
      HANKO_DB_PASSWORD: ${HANKO_DB_PASSWORD:-hanko}
      HANKO_DB_NAME: ${HANKO_DB_NAME:-hanko}
      HANKO_SECRET: ${HANKO_SECRET:-Dqn09li1XXUdLwUry07XWYnLRpmqkzzsu7AtR6Oum5g=}
      HANKO_COOKIE_DOMAIN: ${HANKO_COOKIE_DOMAIN:-localhost}
      HANKO_ALLOWED_ORIGIN: ${HANKO_ALLOWED_ORIGIN:-http://field.localhost:7050}
      HANKO_REDIRECT_URL: ${HANKO_REDIRECT_URL:-http://field.localhost:7050}
      # From main compose.yaml mailpit instance
      SMTP_HOST: ${SMTP_HOST:-mail}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@field.localhost}
      GOOGLE_ENABLED: ${GOOGLE_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./contrib/login/hanko-config.tpl.yaml:/tpl/hanko-config.tpl.yaml:ro
      - hanko_config:/config
    networks:
      - ftm-net
    restart: "on-failure:2"

  # Run Hanko database migrations once before the server starts.
  hanko-migrate:
    image: ghcr.io/teamhanko/hanko:v2.1.0
    command: migrate up --config /config/hanko-config.yaml
    volumes:
      - hanko_config:/config:ro
    depends_on:
      hanko-config:
        condition: service_completed_successfully
      hanko-db:
        condition: service_healthy
    networks:
      - ftm-net
    restart: "on-failure:2"

  # Hanko authentication server.
  # Public API on :8000 (internal), exposed on host port 8088 and via the proxy.
  # Admin API on :8001 (internal only, not exposed).
  hanko:
    image: ghcr.io/teamhanko/hanko:v2.1.0
    command: serve all --config /config/hanko-config.yaml
    ports:
      - "8088:8000"
    volumes:
      - hanko_config:/config:ro
    depends_on:
      hanko-migrate:
        condition: service_completed_successfully
      hanko-db:
        condition: service_healthy
    networks:
      - ftm-net
    restart: unless-stopped
    healthcheck:
      # Use Hanko's built-in readiness probe instead of shell tools not present in image.
      test: ["CMD", "/hanko", "isready", "--config", "/config/hanko-config.yaml", "public"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres database for Hanko.
  hanko-db:
    image: "ghcr.io/hotosm/postgis:18-3.6-alpine"
    environment:
      POSTGRES_USER: ${HANKO_DB_USER:-hanko}
      POSTGRES_PASSWORD: ${HANKO_DB_PASSWORD:-hanko}
      POSTGRES_DB: ${HANKO_DB_NAME:-hanko}
    volumes:
      - hanko_data:/var/lib/postgresql/data
    networks:
      - ftm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HANKO_DB_USER:-hanko} -d ${HANKO_DB_NAME:-hanko}"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
