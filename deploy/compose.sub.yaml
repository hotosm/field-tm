# Core FieldTM production compose file.
# ODK Central and QFieldCloud are managed externally; see compose.odk.yaml
# and compose.qfield.yaml for optional self-hosted addons.

name: field-tm

volumes:
  ftm_db_data:
    name: field-tm-db-data
  ftm_logs:
    name: field-tm-logs
  certs:
    name: field-tm-certs

networks:
  ftm-net:
    name: field-tm
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24

services:
  proxy:
    image: "bunkerity/bunkerweb-all-in-one:1.6.2"
    volumes:
      # - certs:/etc/letsencrypt
      - certs:/data
    environment:
      # General
      BUNKERWEB_INSTANCES: proxy
      LOG_LEVEL: notice
      USE_UI: no
      USE_BUNKERNET: no
      DISABLE_DEFAULT_SERVER: yes
      # Increase domain name max size (for long domain names)
      SERVER_NAMES_HASH_BUCKET_SIZE: 128
      USE_REDIS: no
      # NOTE for bunkerweb nginx it uses the 'resolver' directive:
      # https://nginx.org/en/docs/http/ngx_http_core_module.html#resolver
      # However, nerdctl hardcodes container aliases to /etc/hosts, which
      # cannot be read by Nginx. So we must use a custom dnsmasq resolver
      # service for now.
      # More details: https://github.com/containerd/nerdctl/issues/1387
      # and: https://github.com/bunkerity/bunkerweb/discussions/2221
      DNS_RESOLVERS: 10.20.30.53
      API_WHITELIST_IP: 127.0.0.0/8 10.20.30.0/24
      # Avoid running ModSec rules on internal service calls
      WHITELIST_IP: 10.20.30.0/24
      WHITELIST_URI: https://${FTM_DOMAIN}
      MULTISITE: yes
      USE_REVERSE_PROXY: yes
      ALLOWED_METHODS: OPTIONS|HEAD|GET|POST|PATCH|PUT|DELETE
      USE_REAL_IP: yes
      SERVE_FILES: yes
      USE_BACKUP: no
      USE_METRICS: no
      # USE_ANTIBOT: yes
      USE_LIMIT_CONN: yes
      # BAD_BEHAVIOUR disabled as it's difficult to work with...
      USE_BAD_BEHAVIOR: no
      USE_LIMIT_REQ: yes
      USE_MODSECURITY: yes
      USE_GZIP: yes
      # On client, brotli is preferred over gzip if both are enabled
      USE_BROTLI: yes
      # For OpenTelemetry (Allow-Headers are what the browser can include in the REQUEST headers)
      CUSTOM_HEADER: "Access-Control-Allow-Headers: DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,traceparent,tracestate"
      AUTO_LETS_ENCRYPT: yes
      EMAIL_LETS_ENCRYPT: ${CERT_EMAIL}
      # USE_LETS_ENCRYPT_STAGING: yes
      # Reverse proxy configs — core FieldTM domains only
      SERVER_NAME: ${FTM_DOMAIN} ${FTM_API_DOMAIN:-api.$FTM_DOMAIN}
      ${FTM_DOMAIN}_REVERSE_PROXY_HOST: http://api:8000
      # CORS for the backend is configured by FastAPI
      ${FTM_API_DOMAIN:-api.$FTM_DOMAIN}_REVERSE_PROXY_HOST: http://api:8000
      ${FTM_API_DOMAIN:-api.$FTM_DOMAIN}_MAX_CLIENT_SIZE: 1G
      # Increase timeout slightly for long project creation requests
      ${FTM_API_DOMAIN:-api.$FTM_DOMAIN}_REVERSE_PROXY_READ_TIMEOUT: 90s
    ports:
      - 80:8080
      - 443:8443
    networks:
      - ftm-net
    restart: "unless-stopped"

  # Required as nginx via nerdctl cannot resolve container aliases
  dns:
    image: "docker.io/4km3/dnsmasq:2.90-r3"
    depends_on:
      # Must start after all containers are created and allocated IP addresses
      api:
        condition: service_healthy
    command: [
        "-k", # keep in foreground
        "--log-facility=-", # log to stdout
        "--no-resolv", # don't use default resolv.conf
        "--cache-size=0", # avoid caching to prevent issues on recreate
        "--no-hosts", # Don't read the default /etc/hosts
        "--addn-hosts=/etc/hosts", # Use the nerdctl-injected hosts file
        "--hostsdir=/etc", # Monitor this directory for changes
        "--server=1.1.1.1", # forward to Cloudflare DNS
        "--server=8.8.8.8", # forward to Google DNS
        "--listen-address=127.0.0.1",
        "--listen-address=10.20.30.53", # DNS server inside your network
        "--hosts=/etc/hosts", # use /etc/hosts injected by nerdctl
      ]
    networks:
      ftm-net:
        ipv4_address: 10.20.30.53
    restart: unless-stopped
    healthcheck:
      test: nc -z localhost 53 || exit 1
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: "ghcr.io/hotosm/field-tm/backend:${GIT_BRANCH}"
    volumes:
      - ftm_logs:/opt/logs
    depends_on:
      proxy:
        condition: service_healthy
      fieldtm-db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - ftm-net
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/__lbheartbeat__"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: ${API_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.9"
          memory: 1500M
        reservations:
          cpus: "0.1"
          memory: 100M

  migrations:
    image: "ghcr.io/hotosm/field-tm/backend:${GIT_BRANCH}"
    depends_on:
      proxy:
        condition: service_healthy
      fieldtm-db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - ftm-net
    entrypoint: ["/migrate-entrypoint.sh"]
    restart: "on-failure:2"

  fieldtm-db:
    image: "ghcr.io/hotosm/postgis:16-3.5-alpine"
    # Low max_connections for better performance.
    # See https://richyen.com/postgres/2021/09/03/less-is-more-max-connections.html
    # and other sources online. Approx (cores * 4)
    command: -c 'max_connections=64' -c 'wal_level=logical'
    volumes:
      - ftm_db_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${FTM_DB_USER}
      - POSTGRES_PASSWORD=${FTM_DB_PASSWORD}
      - POSTGRES_DB=${FTM_DB_NAME}
    ports:
      - "5433:5432"
    networks:
      - ftm-net
    restart: "unless-stopped"
    healthcheck:
      test: pg_isready -U ${FTM_DB_USER} -d ${FTM_DB_NAME}
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
